apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress
  namespace: preprod
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /devops
        pathType: Prefix
        backend:
          service:
            name: devops-app
            port:
              number: 80
      - path: /ui
        pathType: Prefix
        backend:
          service:
            name: frontend-app-service
            port:
              number: 80